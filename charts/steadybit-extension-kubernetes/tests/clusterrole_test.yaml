templates:
  - clusterrole.yaml
tests:
  - it: manifest should match snapshot
    asserts:
      - matchSnapshot: { }
  - it: manifest should match snapshot with some disabled features
    set:
      discovery:
        disabled:
          cluster: true
          container: true
          daemonSet: true
          deployment: true
          ingress: true
          node: true
          pod: true
          replicaSet: false #default is true
          statefulSet: true
    asserts:
      - matchSnapshot: { }
  - it: should grant Envoy Gateway permissions when enabled
    set:
      discovery:
        disabled:
          envoyGateway: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["gateway.networking.k8s.io"]
            resources:
              - httproutes
              - gateways
              - gatewayclasses
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups: ["gateway.envoyproxy.io"]
            resources:
              - backendtrafficpolicies
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete
  - it: should not grant Envoy Gateway permissions by default
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: ["gateway.envoyproxy.io"]
            resources:
              - backendtrafficpolicies
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete
